name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

    tags:
      - '*'

  pull_request:


jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements-dev.txt

      - run: flake8 src tests --max-line-length=120


  test-unit:
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    uses: ./.github/workflows/reusable-python.yml

    with:
      python-version: ${{ matrix.python-version }}


  test-integration:
    uses: ./.github/workflows/reusable-python.yml

    with:
      python-version: "3.11"
      test-dir: tests/integration/


  build-image:
    runs-on: ubuntu-latest

    needs:
      - lint
      - test-unit

    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t todo-api:${{ github.sha }} .

      - name: Save image
        run: |
          mkdir -p dist
          docker save todo-api:${{ github.sha }} -o dist/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: dist/image.tar


  sbom:
    runs-on: ubuntu-latest

    needs:
      - build-image

    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: dist

      - name: Load Docker image
        run: |
          docker load -i dist/image.tar

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
          | sh -s -- -b /usr/local/bin v1.4.1

      - name: Generate SBOM
        run: |
          mkdir -p sbom

          IMAGE=todo-api:${{ github.sha }}

          syft $IMAGE -o cyclonedx-json=sbom/image.cdx.json

          syft $IMAGE -o spdx-json=sbom/image.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-files
          path: sbom/


  deploy-staging:
    needs:
      - sbom

    if: github.ref == 'refs/heads/develop'

    uses: ./.github/workflows/reusable-deploy.yml

    with:
      environment: staging


  deploy-production:
    needs:
      - sbom

    if: startsWith(github.ref, 'refs/tags/')

    uses: ./.github/workflows/reusable-deploy.yml

    with:
      environment: production