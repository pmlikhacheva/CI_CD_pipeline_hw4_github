.lint-job:
  stage: lint
  image: python:3.11-slim

  variables:
    MAX_LINE_LENGTH: "88"

  before_script:
    - pip install -r requirements-dev.txt

  script:
    - flake8 src tests --max-line-length=${MAX_LINE_LENGTH}


.test-job:
  stage: test

  before_script:
    - pip install -r requirements-dev.txt

  script:
    - pytest ${TEST_DIRS:-tests/}


.docker-build-job:
  stage: build
  image: docker:26

  services:
    - docker:26-dind

  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""

  script:
    - mkdir -p dist
    - docker build -t ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA} .
    - docker save ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA} -o dist/image.tar

  artifacts:
    paths:
      - dist/image.tar