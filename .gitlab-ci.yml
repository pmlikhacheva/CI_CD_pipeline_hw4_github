include:
  - local: "templates/python-jobs.yml"
  - local: "templates/deploy-jobs.yml"


workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

    - if: '$CI_COMMIT_BRANCH == "main"'

    - if: '$CI_COMMIT_BRANCH == "develop"'

    - if: '$CI_COMMIT_TAG'


default:
  interruptible: true


stages:
  - lint
  - test
  - build
  - sbom
  - deploy


lint:
  extends: .lint-job

  variables:
    MAX_LINE_LENGTH: "120"


test:unit:
  extends: .test-job

  parallel:
    matrix:
      - PYTHON_VERSION: ["3.10", "3.11", "3.12"]

  image: python:${PYTHON_VERSION}-slim


test:integration:
  extends: .test-job

  variables:
    TEST_DIRS: tests/integration/

  allow_failure: true

  image: python:3.11-slim


build:image:
  extends: .docker-build-job

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

    - if: '$CI_COMMIT_TAG'


sbom:image:
  stage: sbom

  image: docker:26

  services:
    - docker:26-dind

  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""

  needs:
    - job: build:image
      artifacts: true

  before_script:
    - apk add --no-cache curl

    - curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
      | sh -s -- -b /usr/local/bin v1.4.1

    - docker load -i dist/image.tar

  script:
    - mkdir -p sbom

    - export IMAGE=${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}

    - syft ${IMAGE} -o cyclonedx-json=sbom/image.cdx.json

    - syft ${IMAGE} -o spdx-json=sbom/image.spdx.json

  artifacts:
    expose_as: "SBOM todo-api image"

    expire_in: 90 days

    paths:
      - sbom/image.cdx.json
      - sbom/image.spdx.json


deploy:staging:
  extends: .ssh-deploy

  environment:
    name: staging

  variables:
    DEPLOY_HOST: staging.example.com

  allow_failure: true

  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'


deploy:production:
  extends: .k8s-deploy

  environment:
    name: production

  variables:
    K8S_DEPLOYMENT: todo-api
    K8S_NAMESPACE: production

  when: manual

  rules:
    - if: '$CI_COMMIT_TAG'